  html,body { width:100%; height:100%; background:#05060d; overflow:hidden;

  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(120% 120% at 50% 0%, #101a3a 0%, #070a18 55%, #04050c 100%); }
  canvas#game { display:block; image-rendering:auto; box-shadow:0 30px 120px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.03); }

    letter-spacing:.4px; z-index:5; opacity:.75; pointer-events:none; text-align:center; }

<script>
"use strict";
/* ============================================================================
   CHAOS CUP ⚽  —  Outrageous Arcade Soccer
   Single-file, zero-dependency HTML5 canvas game.

   Design pillars (kept honest by chaos-cup/LOOP_PROMPT.md):
     A) GRAPHICS  — rich variety in player looks, movement, and AI intelligence
     B) CONTROLS  — Mario-Kart / Nintendo-tier "pick up and play" feel
     C) OUTRAGEOUS — crazy characters, weapons, weird pick-me-up items
     D) POLISH    — reads like a paid game (juice, audio, UI, feedback)

   Code map (search these banners):
     [CONFIG] [RNG/MATH] [INPUT] [AUDIO] [PARTICLES] [ROSTER] [DRAW-CHAR]
     [BALL] [PLAYER] [AI] [POWERUPS] [MATCH] [CAMERA/JUICE] [HUD] [SCENES] [LOOP]
   ========================================================================== */

/* ------------------------------- [CONFIG] -------------------------------- */
const VW = 1280, VH = 720;                 // logical design resolution
const PITCH = { x: 96, y: 128, w: 1088, h: 512 };
const GOAL_H = 150, GOAL_DEPTH = 34;
const PLAYERS_PER_SIDE = 4;                // 1 keeper + 3 outfield
const MATCH_SECONDS = 120;                 // per match (halves handled loosely)
const FIXED_DT = 1 / 60;

const params = new URLSearchParams(location.search);
const AUTO = params.get('auto') === '1';   // AI vs AI exhibition (for harness)
const DEBUG = params.get('debug') === '1'; // show FPS + hitboxes
const SEEDP = params.get('seed');

/* ----------------------------- [RNG/MATH] -------------------------------- */
let _seed = (SEEDP ? (parseInt(SEEDP, 10) >>> 0) : 0x9e3779b9) || 1;
function rand() { // deterministic xorshift32 in [0,1)
  _seed ^= _seed << 13; _seed >>>= 0;
  _seed ^= _seed >> 17;
  _seed ^= _seed << 5;  _seed >>>= 0;
  return _seed / 4294967296;
}
const rnd = (a, b) => a + rand() * (b - a);
const rndi = (a, b) => Math.floor(rnd(a, b + 1));
const pick = (arr) => arr[Math.floor(rand() * arr.length)];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const TAU = Math.PI * 2;
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
const angTo = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);
const angLerp = (a, b, t) => { let d = ((b - a + Math.PI) % TAU) - Math.PI; return a + d * t; };
const easeOut = (t) => 1 - Math.pow(1 - t, 3);
const easeInOut = (t) => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
function now() { return performance.now() / 1000; }

/* -------------------------------- [INPUT] -------------------------------- */
const Input = {
  keys: {}, kickBuf: 0, powBuf: 0, switchBuf: 0, pausePressed: false, anyPressed: false,
  mx: 0, my: 0, mDown: false,
  stick: { active: false, x: 0, y: 0 },
  axisX() {
    let x = 0;
    if (this.keys['arrowleft'] || this.keys['a']) x -= 1;
    if (this.keys['arrowright'] || this.keys['d']) x += 1;
    if (this.stick.active) x = this.stick.x;
    if (padAxis) x = padAxis.x || x;
    return clamp(x, -1, 1);
  },
  axisY() {
    let y = 0;
    if (this.keys['arrowup'] || this.keys['w']) y -= 1;
    if (this.keys['arrowdown'] || this.keys['s']) y += 1;
    if (this.stick.active) y = this.stick.y;
    if (padAxis) y = padAxis.y || y;
    return clamp(y, -1, 1);
  }
};
let padAxis = null, padPrev = {};
function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = pads && pads[0];
  if (!gp) { padAxis = null; return; }
  let x = gp.axes[0] || 0, y = gp.axes[1] || 0;
  if (Math.abs(x) < 0.18) x = 0; if (Math.abs(y) < 0.18) y = 0;
  // dpad fallback
  if (gp.buttons[14] && gp.buttons[14].pressed) x = -1;
  if (gp.buttons[15] && gp.buttons[15].pressed) x = 1;
  if (gp.buttons[12] && gp.buttons[12].pressed) y = -1;
  if (gp.buttons[13] && gp.buttons[13].pressed) y = 1;
  padAxis = { x, y };
  const edge = (i) => gp.buttons[i] && gp.buttons[i].pressed && !padPrev[i];
  if (edge(0)) { Input.kickBuf = 0.16; Input.anyPressed = true; }        // A
  if (edge(1) || edge(2)) { Input.powBuf = 0.16; Input.anyPressed = true; } // B/X
  if (edge(3) || edge(4) || edge(5)) Input.switchBuf = 0.16;            // Y/bumpers
  if (edge(9)) Input.pausePressed = true;                               // start
  for (let i = 0; i < gp.buttons.length; i++) padPrev[i] = gp.buttons[i].pressed;
}
addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'tab'].includes(k)) e.preventDefault();
  if (e.repeat) return;
  Input.keys[k] = true; Input.anyPressed = true; ensureAudio();
  if (k === ' ') Input.kickBuf = 0.16;
  if (k === 'shift') Input.powBuf = 0.16;
  if (k === 'tab') Input.switchBuf = 0.16;
  if (k === 'escape' || k === 'p') Input.pausePressed = true;
  if (k === 'm') Audio.toggleMute();
});
addEventListener('keyup', (e) => { Input.keys[e.key.toLowerCase()] = false; });
addEventListener('pointerdown', () => { Input.anyPressed = true; ensureAudio(); });
addEventListener('blur', () => { Input.keys = {}; });

/* Canvas-space pointer (for menu buttons) */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function toWorld(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) / r.width * VW, y: (e.clientY - r.top) / r.height * VH };
}
canvas.addEventListener('pointermove', (e) => { const p = toWorld(e); Input.mx = p.x; Input.my = p.y; });
canvas.addEventListener('pointerdown', (e) => { const p = toWorld(e); Input.mx = p.x; Input.my = p.y; Input.mDown = true; });
addEventListener('pointerup', () => { Input.mDown = false; });

/* Touch controls */
(function setupTouch() {
  const isTouch = matchMedia('(pointer:coarse)').matches;
  const touch = document.getElementById('touch');
  if (isTouch) touch.classList.add('on');
  const stickEl = document.getElementById('stick'), nub = document.getElementById('nub');
  let sid = null, cx = 0, cy = 0, R = 62;
  const start = (e) => { const t = e.changedTouches[0]; sid = t.identifier; const r = stickEl.getBoundingClientRect();
    cx = r.left + r.width / 2; cy = r.top + r.height / 2; Input.stick.active = true; ensureAudio(); move(e); };
  const move = (e) => { for (const t of e.changedTouches) if (t.identifier === sid) {
      let dx = t.clientX - cx, dy = t.clientY - cy; const d = Math.hypot(dx, dy) || 1; const c = Math.min(d, R);
      nub.style.transform = `translate(${dx / d * c}px,${dy / d * c}px)`;
      Input.stick.x = dx / R; Input.stick.y = dy / R; } };
  const end = (e) => { for (const t of e.changedTouches) if (t.identifier === sid) {
      sid = null; Input.stick.active = false; Input.stick.x = Input.stick.y = 0; nub.style.transform = 'translate(0,0)'; } };
  stickEl.addEventListener('touchstart', start, { passive: false });
  stickEl.addEventListener('touchmove', move, { passive: false });
  stickEl.addEventListener('touchend', end); stickEl.addEventListener('touchcancel', end);
  const bind = (id, fn) => { const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); ensureAudio(); }, { passive: false });
    el.addEventListener('click', fn); };
  bind('btnKick', () => { Input.kickBuf = 0.16; Input.anyPressed = true; });
  bind('btnPow', () => { Input.powBuf = 0.16; Input.anyPressed = true; });
})();

/* -------------------------------- [AUDIO] -------------------------------- */
const Audio = {
  ctx: null, master: null, muted: false, musicGain: null, musicTimer: 0, musicStep: 0,
  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = 0.55; this.master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = 0.18; this.musicGain.connect(this.master);
  },
  toggleMute() { this.muted = !this.muted; if (this.master) this.master.gain.value = this.muted ? 0 : 0.55; },
  blip(freq, dur, type = 'square', vol = 0.3, slideTo = null) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t + dur + 0.02);
  },
  noise(dur, vol = 0.25, hp = 800) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime, n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = this.ctx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(this.master); src.start();
  },
  kick() { this.blip(220, 0.12, 'triangle', 0.35, 90); this.noise(0.05, 0.2, 1200); },
  pass() { this.blip(330, 0.08, 'triangle', 0.22, 260); },
  bounce() { this.blip(180, 0.06, 'sine', 0.16, 120); },
  wall() { this.blip(140, 0.05, 'sine', 0.14, 90); },
  whistle() { this.blip(2000, 0.18, 'square', 0.2, 2400); setTimeout(() => this.blip(2200, 0.12, 'square', 0.18), 120); },
  pickup() { this.blip(600, 0.08, 'square', 0.25); setTimeout(() => this.blip(900, 0.1, 'square', 0.25), 70); setTimeout(() => this.blip(1300, 0.1, 'square', 0.22), 150); },
  power(kind) { this.blip(300, 0.14, 'sawtooth', 0.28, 800); this.noise(0.12, 0.14, 500); },
  goal() { const s = [523, 659, 784, 1046]; s.forEach((f, i) => setTimeout(() => this.blip(f, 0.22, 'square', 0.3), i * 90)); this.crowd(); },
  save() { this.blip(400, 0.1, 'square', 0.24, 700); },
  tackle() { this.noise(0.12, 0.3, 300); this.blip(120, 0.1, 'triangle', 0.2, 70); },
  crowd() { this.noise(0.7, 0.22, 300); this.noise(0.5, 0.14, 700); },
  ui() { this.blip(660, 0.05, 'square', 0.18); },
  count(n) { this.blip(n > 0 ? 500 : 900, 0.14, 'square', 0.26); },
  tickMusic(dt, on) {
    if (!this.ctx || this.muted || !on) return;
    this.musicTimer -= dt;
    if (this.musicTimer <= 0) {
      this.musicTimer = 0.16;
      const scale = [0, 3, 5, 7, 10, 12];
      const root = 196; // G3
      const bassSeq = [0, 0, 5, 7];
      const step = this.musicStep % 16;
      if (step % 4 === 0) { const b = bassSeq[(this.musicStep >> 2) % 4]; this._m(root * Math.pow(2, b / 12) / 2, 0.3, 'triangle', 0.5); }
      if (rand() < 0.7) { const nn = scale[rndi(0, scale.length - 1)]; this._m(root * Math.pow(2, nn / 12), 0.14, 'square', 0.28); }
      this.musicStep++;
    }
  },
  _m(freq, dur, type, vol) {
    const t = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.musicGain); o.start(t); o.stop(t + dur + 0.02);
  }
};
function ensureAudio() { Audio.init(); if (Audio.ctx && Audio.ctx.state === 'suspended') Audio.ctx.resume(); }

/* ------------------------------ [PARTICLES] ------------------------------ */
const P = [];
function spawnParticle(o) { P.push(Object.assign({ x: 0, y: 0, vx: 0, vy: 0, life: 1, max: 1, r: 3, c: '#fff', g: 300, drag: 0.98, shape: 'circle', spin: 0, rot: 0, layer: 1 }, o)); }
function burst(x, y, n, opt = {}) {
  for (let i = 0; i < n; i++) {
    const a = rnd(0, TAU), s = rnd(opt.smin || 60, opt.smax || 260);
    spawnParticle(Object.assign({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (opt.up || 0), life: rnd(opt.lmin || .3, opt.lmax || .7), max: 1, r: rnd(opt.rmin || 2, opt.rmax || 5), c: opt.c || '#fff', g: opt.g == null ? 500 : opt.g, drag: opt.drag || 0.92, shape: opt.shape || 'circle', spin: rnd(-10, 10), layer: opt.layer || 2 }, opt.extra || {}));
  }
}
function confetti(x, y, n) {
  const cols = ['#ff4d6d', '#ffd23f', '#3ddc97', '#4ea8ff', '#c77dff', '#ff9f1c'];
  for (let i = 0; i < n; i++) {
    const a = rnd(-2.6, -0.5), s = rnd(120, 460);
    spawnParticle({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rnd(1.2, 2.4), max: 2.4, r: rnd(3, 6), c: pick(cols), g: 420, drag: 0.99, shape: 'rect', spin: rnd(-14, 14), rot: rnd(0, TAU), layer: 4 });
  }
}
function updateParticles(dt) {
  for (let i = P.length - 1; i >= 0; i--) {
    const p = P[i]; p.life -= dt; if (p.life <= 0) { P.splice(i, 1); continue; }
    p.vy += p.g * dt; p.vx *= p.drag; p.vy *= p.drag; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.spin * dt;
  }
}
function drawParticles(layer) {
  for (const p of P) {
    if (p.layer !== layer) continue;
    const a = clamp(p.life / p.max, 0, 1);
    ctx.globalAlpha = a; ctx.fillStyle = p.c;
    if (p.shape === 'rect') { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillRect(-p.r, -p.r * 0.6, p.r * 2, p.r * 1.2); ctx.restore(); }
    else if (p.shape === 'star') { drawStar(p.x, p.y, 5, p.r, p.r * 0.5, p.rot); ctx.fill(); }
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
}
function drawStar(cx, cy, spikes, outer, inner, rot) {
  ctx.beginPath(); let r = rot - Math.PI / 2;
  for (let i = 0; i < spikes; i++) { ctx.lineTo(cx + Math.cos(r) * outer, cy + Math.sin(r) * outer); r += Math.PI / spikes; ctx.lineTo(cx + Math.cos(r) * inner, cy + Math.sin(r) * inner); r += Math.PI / spikes; } ctx.closePath();
}

/* -------------------------------- [ROSTER] ------------------------------- */
/* Each character is procedurally drawable. Stats 0..1: spd agi pow iq chaos.
   accessory + face + gait drive VISUAL & MOVEMENT variety. Personality drives AI. */
const ROSTER = [
  { name: 'EL TORO',    body: '#c0392b', skin: '#e08a6a', acc: 'horns',    face: 'angry',  emoji: '🐂', spd: .62, agi: .55, pow: .95, iq: .5,  chaos: .7,  gait: 'stomp' },
  { name: 'ROBO-9000',  body: '#8fa3b8', skin: '#c8d6e2', acc: 'antenna',  face: 'robot',  emoji: '🤖', spd: .7,  agi: .6,  pow: .7,  iq: .95, chaos: .15, gait: 'glide' },
  { name: 'GRANNY SLAM',body: '#16a085', skin: '#f0c9a8', acc: 'bun',      face: 'glasses',emoji: '👵', spd: .5,  agi: .7,  pow: .55, iq: .9,  chaos: .5,  gait: 'shuffle' },
  { name: 'YETI',       body: '#e9f0f7', skin: '#cfe0ef', acc: 'none',     face: 'fang',   emoji: '🦍', spd: .45, agi: .4,  pow: 1.0, iq: .45, chaos: .6,  gait: 'lumber' },
  { name: 'ZAP',        body: '#7bed9f', skin: '#a8ffcf', acc: 'antenna2', face: 'alien',  emoji: '👽', spd: .95, agi: .9,  pow: .45, iq: .6,  chaos: .85, gait: 'skitter' },
  { name: 'CAP CACTUS', body: '#2ecc71', skin: '#27ae60', acc: 'spikes',   face: 'flat',   emoji: '🌵', spd: .5,  agi: .5,  pow: .7,  iq: .7,  chaos: .3,  gait: 'stomp' },
  { name: 'LAVA',       body: '#e67e22', skin: '#ff6b35', acc: 'flame',    face: 'angry',  emoji: '🌋', spd: .7,  agi: .65, pow: .85, iq: .5,  chaos: .9,  gait: 'bounce' },
  { name: 'DISCO',      body: '#9b59b6', skin: '#d98cff', acc: 'afro',     face: 'shades', emoji: '🕺', spd: .78, agi: .95, pow: .5,  iq: .55, chaos: .8,  gait: 'groove' },
  { name: 'CHOMP',      body: '#3498db', skin: '#5dade2', acc: 'fin',      face: 'fang',   emoji: '🦈', spd: .82, agi: .7,  pow: .8,  iq: .5,  chaos: .75, gait: 'lunge' },
  { name: 'WIZBEARD',   body: '#2c3e9e', skin: '#e6c79c', acc: 'wizhat',   face: 'beard',  emoji: '🧙', spd: .55, agi: .6,  pow: .6,  iq: .95, chaos: .65, gait: 'float' },
  { name: 'SHADOW',     body: '#2d3436', skin: '#636e72', acc: 'headband', face: 'ninja',  emoji: '🥷', spd: .9,  agi: .95, pow: .55, iq: .75, chaos: .5,  gait: 'dash' },
  { name: 'REX',        body: '#27ae60', skin: '#2ecc71', acc: 'ridge',    face: 'fang',   emoji: '🦖', spd: .68, agi: .5,  pow: .92, iq: .4,  chaos: .7,  gait: 'stomp' },
  { name: 'SIR KICKS',  body: '#95a5a6', skin: '#bdc3c7', acc: 'helmet',   face: 'flat',   emoji: '🛡️', spd: .6,  agi: .6,  pow: .75, iq: .8,  chaos: .25, gait: 'march' },

function pickTeams(userChoice) {
  const idx = [...ROSTER.keys()];
  // shuffle
  for (let i = idx.length - 1; i > 0; i--) { const j = Math.floor(rand() * (i + 1));[idx[i], idx[j]] = [idx[j], idx[i]]; }
  const teamA = idx.slice(0, PLAYERS_PER_SIDE).map(i => ROSTER[i]);
  const teamB = idx.slice(PLAYERS_PER_SIDE, PLAYERS_PER_SIDE * 2).map(i => ROSTER[i]);
  if (userChoice != null) { // ensure chosen char is captain of team A
    const cur = teamA.findIndex(d => d.name === userChoice.name);
    if (cur >= 0) { const t = teamA[0]; teamA[0] = teamA[cur]; teamA[cur] = t; }
    else teamA[0] = userChoice;
  }
  return [teamA, teamB];
}
function formation(team, defs, teamColor) {
  const players = [];
  const attackDir = team === 0 ? 1 : -1;
  const baseX = team === 0 ? PITCH.x : PITCH.x + PITCH.w;
  // GK
  players.push(makePlayer(defs[0], team, teamColor, 'gk', baseX + attackDir * 46, PITCH.y + PITCH.h / 2));
  players[0].slot = -1;
  // 3 outfield in a triangle
  const spots = [[0.28, 0.28], [0.28, 0.72], [0.42, 0.5]];
  for (let i = 1; i < defs.length; i++) {
    const s = spots[i - 1] || [0.3, 0.5];
    const hx = team === 0 ? PITCH.x + PITCH.w * s[0] : PITCH.x + PITCH.w * (1 - s[0]);
    const hy = PITCH.y + PITCH.h * s[1];
    const pl = makePlayer(defs[i], team, teamColor, 'out', hx, hy);
    pl.slot = i - 1; // 0..2 — used to keep supporters in distinct lanes
    players.push(pl);
  }
  return { players, chaser: null, score: 0, color: teamColor };
}
function newMatch(userChoice, aiOnly) {
  const [defsA, defsB] = pickTeams(userChoice);
  const teams = [formation(0, defsA, '#39a7ff'), formation(1, defsB, '#ff4d6d')];
  const match = {
    teams, items: [], decoys: [], tornado: null,
    time: MATCH_SECONDS, state: 'countdown', countdown: 3.2, celebrateT: 0, scorer: null,
    userPlayer: null, aiOnly: !!aiOnly, itemTimer: 3, kickoffTeam: 1,
    lastGoalTeam: null, msgT: 0, resultT: 0, slowmo: 1, half: 1,
    juice: makeJuice(),

    match.userPlayer = teams[0].players[1]; // an outfield player
    match.userPlayer.isUser = true;
  }
  Ball.reset();
  return match;
}

function makeJuice() {
  return {
    shakeT: 0, shakeMag: 0, flashC: null, flashA: 0, hitstop: 0, zoom: 1, zoomV: 0,
    shake(m) { this.shakeMag = Math.max(this.shakeMag, m); this.shakeT = 0.35; },
    flash(c, a) { this.flashC = c; this.flashA = Math.max(this.flashA, a); },
    punch(z) { this.zoomV += z; },
    stop(t) { this.hitstop = Math.max(this.hitstop, t); },
    update(dt) {
      if (this.shakeT > 0) { this.shakeT -= dt; if (this.shakeT <= 0) this.shakeMag = 0; }
      this.shakeMag *= 0.9;
      this.flashA *= 0.86; if (this.flashA < 0.01) this.flashA = 0;
      this.zoom += this.zoomV * dt * 12; this.zoomV *= 0.82; this.zoom += (1 - this.zoom) * 0.08;
    },
    apply() {
      const sx = this.shakeMag > 0.1 ? rnd(-1, 1) * this.shakeMag : 0;
      const sy = this.shakeMag > 0.1 ? rnd(-1, 1) * this.shakeMag : 0;
      ctx.translate(VW / 2, VH / 2); ctx.scale(this.zoom, this.zoom); ctx.translate(-VW / 2 + sx, -VH / 2 + sy);
    }

}

/* ==================== UPDATE: PHYSICS + GAME LOGIC ======================== */
function doKick(p, vx, vy, power, match) {
  Ball.kick(vx, vy, power);
  p.kickT = 0.22; p.kickCooldown = 0.28; p.squash = 0.35;
  Ball.lastKicker = p;
  if (power > 0.85) { Audio.kick(); match.juice.shake(4); match.juice.punch(0.05); burst(Ball.x, Ball.y, 10, { c: '#fff', smax: 200 }); }
  else Audio.pass();
}

function userControl(match, dt) {
  const u = match.userPlayer; if (!u) return;
  // auto-switch to most relevant teammate (nearest to ball, not GK), unless user recently acted
  const team = match.teams[0];
  let want = u;
  if (Ball.owner && Ball.owner.team === 0 && Ball.owner.role !== 'gk') want = Ball.owner;
  else {
    let bd = 1e9;
    for (const q of team.players) { if (q.role === 'gk') continue; const d = dist2(q.x, q.y, Ball.x, Ball.y); if (d < bd) { bd = d; want = q; } }
  }
  if (Input.switchBuf > 0) { // manual cycle
    Input.switchBuf = 0; const outs = team.players.filter(q => q.role !== 'gk');
    const idx = outs.indexOf(u); want = outs[(idx + 1) % outs.length]; Audio.ui();
  } else if (want !== u && u.controlT < 0.25 && Ball.owner !== u) {
    u.isUser = false; want.isUser = true; match.userPlayer = want;
  }
  const me = match.userPlayer; me.controlT += dt;

  // movement
  let ix = Input.axisX(), iy = Input.axisY();
  const mag = Math.hypot(ix, iy);
  if (mag > 1) { ix /= mag; iy /= mag; }
  me._ax = ix; me._ay = iy;
  if (mag > 0.2) { me.facing = angLerp(me.facing, Math.atan2(iy, ix), 0.35); me.controlT = 0; }

  // kick (context-sensitive, aim-assisted) — Nintendo ease
  if (Input.kickBuf > 0 && me.kickCooldown <= 0) {
    Input.kickBuf = 0;
    if (Ball.owner === me) {
      const oppGoalX = PITCH.x + PITCH.w, oppGoalY = PITCH.y + PITCH.h / 2;
      // base aim: movement dir, else facing, else goalward
      let aim = (mag > 0.2) ? Math.atan2(iy, ix) : me.facing;
      // aim assist: bias toward goal / open teammate
      const goalAim = angTo(me.x, me.y, oppGoalX, clamp(me.y, oppGoalY - 50, oppGoalY + 50));
      const inRange = dist(me.x, me.y, oppGoalX, oppGoalY) < 460;
      // choose pass if a teammate lies close to aim and is forward
      let passMate = null, bestDot = 0.86;
      for (const mt of match.teams[0].players) {
        if (mt === me || mt.role === 'gk') continue;
        const a = angTo(me.x, me.y, mt.x, mt.y); const d = Math.cos(a - aim);
        if (d > bestDot && dist(me.x, me.y, mt.x, mt.y) < 360) { bestDot = d; passMate = mt; }
      }
      if (passMate && !inRange) {
        const a = angTo(me.x, me.y, passMate.x + passMate.vx * 0.3, passMate.y + passMate.vy * 0.3);
        doKick(me, Math.cos(a) * 460, Math.sin(a) * 460, 0.7, match);
        burst(me.x, me.y, 6, { c: me.teamColor, smax: 120 });
      } else {
        // shot with assist toward goal mouth
        let a = aim;
        if (inRange) a = angLerp(aim, goalAim, 0.55);
        const power = 1;
        doKick(me, Math.cos(a) * 640, Math.sin(a) * 640, power, match);
      }
    } else {
      // tackle / lunge toward ball
      me.tackleT = 0.28; me.kickCooldown = 0.3;
      const a = angTo(me.x, me.y, Ball.x, Ball.y);
      me._ax = Math.cos(a) * 2.2; me._ay = Math.sin(a) * 2.2; me.squash = 0.3;
      Audio.tackle();
      // steal if close
      if (Ball.owner && Ball.owner.team !== 0 && dist(me.x, me.y, Ball.x, Ball.y) < 46 && Ball.owner.giantT <= 0) {
        Ball.owner = null; Ball.ownerCooldown = 0.12; announce('TACKLE!', '#3ddc97'); burst(Ball.x, Ball.y, 10, { c: '#3ddc97' }); match.juice.shake(3);
      }
    }
  }
  // power-up
  if (Input.powBuf > 0) { Input.powBuf = 0; if (me.powerup) activatePower(me, match); }
}

function integratePlayer(p, dt, match) {
  // status timers
  for (const k of ['frozenT', 'giantT', 'tinyT', 'rocketT', 'magnetT', 'ghostT', 'stunT', 'tackledT', 'slipT']) if (p[k] > 0) p[k] -= dt;
  p.kickT = Math.max(0, p.kickT - dt); p.kickCooldown = Math.max(0, p.kickCooldown - dt);
  p.tackleT = Math.max(0, p.tackleT - dt); p.celebrateT = Math.max(0, p.celebrateT - dt);
  p.squash = lerp(p.squash, 0, 0.18);

  p.scaleMod = lerp(p.scaleMod, p.giantT > 0 ? 1.9 : p.tinyT > 0 ? 0.55 : 1, 0.15);
  p.r = 18 * p.scaleMod;

  let speed = lerp(180, 340, p.stat('spd'));
  if (p.rocketT > 0) speed *= 1.9;
  if (p.giantT > 0) speed *= 1.05;
  if (p.tinyT > 0) speed *= 1.25;
  if (p.frozenT > 0 || p.stunT > 0) speed = 0;
  if (p.slipT > 0) speed *= 0.3;
  if (Ball.owner === p) speed *= 0.9; // dribbling a touch slower

  const ax = (p._ax || 0), ay = (p._ay || 0);
  const accel = 2400;
  p.vx += ax * accel * dt; p.vy += ay * accel * dt;
  // cap to speed
  const sp = Math.hypot(p.vx, p.vy);
  if (sp > speed) { p.vx = p.vx / sp * speed; p.vy = p.vy / sp * speed; }
  // friction when no input
  if (Math.abs(ax) < 0.05 && Math.abs(ay) < 0.05) { p.vx *= 0.82; p.vy *= 0.82; }
  if (p.slipT > 0) { p.vx *= 0.99; p.vy *= 0.99; } // keep sliding on banana
  p._ax = p._ay = 0;

  p.x += p.vx * dt; p.y += p.vy * dt;
  // bounds
  const pr = p.r;
  p.x = clamp(p.x, PITCH.x + pr, PITCH.x + PITCH.w - pr);
  p.y = clamp(p.y, PITCH.y + pr, PITCH.y + PITCH.h - pr);
  // animation phase
  p.animPhase += Math.hypot(p.vx, p.vy) * dt * 0.06;
  if (Math.hypot(p.vx, p.vy) > 40 && p.frozenT <= 0) { /* running */ }
}

function playerCollisions(match) {
  const all = [...match.teams[0].players, ...match.teams[1].players];
  for (let i = 0; i < all.length; i++) for (let j = i + 1; j < all.length; j++) {
    const a = all[i], b = all[j];
    if (a.ghostT > 0 || b.ghostT > 0) continue;
    const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 1, min = a.r + b.r;
    if (d < min) {
      const push = (min - d) / 2, nx = dx / d, ny = dy / d;
      const wa = a.giantT > 0 ? 0.15 : b.giantT > 0 ? 0.85 : 0.5;
      a.x -= nx * push * (1 - wa) * 2 * (a.frozenT > 0 ? 0.2 : 1);
      a.y -= ny * push * (1 - wa) * 2 * (a.frozenT > 0 ? 0.2 : 1);
      b.x += nx * push * wa * 2 * (b.frozenT > 0 ? 0.2 : 1);
      b.y += ny * push * wa * 2 * (b.frozenT > 0 ? 0.2 : 1);
      // giant knockback
      if (a.giantT > 0 && b.giantT <= 0 && Math.hypot(a.vx, a.vy) > 150) { b.vx += nx * 260; b.vy += ny * 260; b.tackledT = 0.4; }
      if (b.giantT > 0 && a.giantT <= 0 && Math.hypot(b.vx, b.vy) > 150) { a.vx -= nx * 260; a.vy -= ny * 260; a.tackledT = 0.4; }
      // steal on contact if opponent tackling
      if (Ball.owner && (Ball.owner === a || Ball.owner === b)) {
        const owner = Ball.owner, other = owner === a ? b : a;
        if (other.team !== owner.team && (other.tackleT > 0 || other.giantT > 0) && owner.giantT <= 0) {
          Ball.owner = null; Ball.ownerCooldown = 0.12;
          if (other.isUser || owner.isUser) announce('STOLEN!', '#3ddc97');
          burst(Ball.x, Ball.y, 8, { c: '#fff' });
        }
      }
    }
  }
}

function updateBall(dt, match) {
  if (Ball.ownerCooldown > 0) Ball.ownerCooldown -= dt;
  // possession / magnet capture
  if (Ball.owner == null && Ball.ownerCooldown <= 0) {
    let cand = null, bd = 1e9;
    for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
      if (p.frozenT > 0 || p.stunT > 0) continue;
      const reach = p.r + Ball.r + (p.magnetT > 0 ? 60 : 6);
      const d = dist(p.x, p.y, Ball.x, Ball.y);
      if (d < reach && d < bd) { bd = d; cand = p; }
    }
    if (cand) { Ball.owner = cand; if (cand.isUser) { /* subtle */ } }
  }
  // magnet pulls ball
  for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
    if (p.magnetT > 0 && Ball.owner !== p) {
      const a = angTo(Ball.x, Ball.y, p.x, p.y); const d = dist(p.x, p.y, Ball.x, Ball.y);
      if (d < 260) { Ball.vx += Math.cos(a) * 900 * dt; Ball.vy += Math.sin(a) * 900 * dt; }
    }
  }

  if (Ball.owner) {
    const p = Ball.owner;
    if (p.frozenT > 0 || p.stunT > 0) { Ball.owner = null; Ball.ownerCooldown = 0.2; }
    else {
      // dribble: keep ball just ahead of feet, magnetic + smooth
      const fx = p.x + Math.cos(p.facing) * (p.r + 6), fy = p.y + Math.sin(p.facing) * (p.r + 6);
      Ball.x = lerp(Ball.x, fx, 0.4); Ball.y = lerp(Ball.y, fy, 0.4);
      Ball.vx = p.vx; Ball.vy = p.vy; Ball.rot += Math.hypot(p.vx, p.vy) * dt * 0.02;
      p.controlT = Math.min(p.controlT, 0.05);
    }
  } else {
    // homing curve
    if (Ball.homing && Ball.homing.t > 0) {
      Ball.homing.t -= dt; const a = angTo(Ball.x, Ball.y, Ball.homing.gx, Ball.homing.gy);
      const sp = Math.hypot(Ball.vx, Ball.vy);
      const ta = angLerp(Math.atan2(Ball.vy, Ball.vx), a, 0.06);
      Ball.vx = Math.cos(ta) * sp; Ball.vy = Math.sin(ta) * sp;
      if (rand() < 0.5) burst(Ball.x, Ball.y, 1, { c: '#00cec9', g: 0, smax: 30, lmax: 0.3 });
    }
    Ball.x += Ball.vx * dt; Ball.y += Ball.vy * dt;
    Ball.vx *= 0.985; Ball.vy *= 0.985;
    Ball.rot += Math.hypot(Ball.vx, Ball.vy) * dt * 0.03;
    // arc
    Ball.z += Ball.vz; Ball.vz -= 6 * dt; if (Ball.z < 0) { Ball.z = 0; if (Ball.vz < -0.4) { Ball.vz *= -0.45; Audio.bounce(); } else Ball.vz = 0; }
    // wall bounce (except goal mouths)
    const inGoalYspan = Ball.y > PITCH.y + PITCH.h / 2 - GOAL_H / 2 && Ball.y < PITCH.y + PITCH.h / 2 + GOAL_H / 2;
    if (Ball.x < PITCH.x + Ball.r && !(inGoalYspan)) { Ball.x = PITCH.x + Ball.r; Ball.vx = Math.abs(Ball.vx) * 0.7; Audio.wall(); }
    if (Ball.x > PITCH.x + PITCH.w - Ball.r && !(inGoalYspan)) { Ball.x = PITCH.x + PITCH.w - Ball.r; Ball.vx = -Math.abs(Ball.vx) * 0.7; Audio.wall(); }
    if (Ball.y < PITCH.y + Ball.r) { Ball.y = PITCH.y + Ball.r; Ball.vy = Math.abs(Ball.vy) * 0.7; Audio.wall(); }
    if (Ball.y > PITCH.y + PITCH.h - Ball.r) { Ball.y = PITCH.y + PITCH.h - Ball.r; Ball.vy = -Math.abs(Ball.vy) * 0.7; Audio.wall(); }
    // trail
    if (Math.hypot(Ball.vx, Ball.vy) > 120) { Ball.trail.push({ x: Ball.x, y: Ball.y, a: 1 }); if (Ball.trail.length > 12) Ball.trail.shift(); }
  }
  for (const t of Ball.trail) t.a *= 0.85;
  while (Ball.trail.length && Ball.trail[0].a < 0.05) Ball.trail.shift();

  // GOAL detection
  if (match.state === 'play') {
    const cy = PITCH.y + PITCH.h / 2;
    if (Ball.x < PITCH.x + 2 && Math.abs(Ball.y - cy) < GOAL_H / 2) doGoal(match, 1);
    else if (Ball.x > PITCH.x + PITCH.w - 2 && Math.abs(Ball.y - cy) < GOAL_H / 2) doGoal(match, 0);
  }

  // bomb ball explosion on hard contact with a player
  if (Ball.bombT > 0) {
    Ball.bombT -= dt;
    for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
      if (Ball.owner === p) continue;
      if (dist(p.x, p.y, Ball.x, Ball.y) < p.r + Ball.r + 4 && Math.hypot(Ball.vx, Ball.vy) > 200) { explodeBall(match); break; }
    }
  }
}
function explodeBall(match) {
  burst(Ball.x, Ball.y, 40, { c: '#ff6b35', smax: 480, up: 40 });
  burst(Ball.x, Ball.y, 20, { c: '#2d3436', smax: 300 });
  match.juice.shake(14); match.juice.flash('#ff6b35', 0.4); match.juice.punch(0.12); Audio.power('bomb'); Audio.crowd();
  announce('💥 BOOM!', '#ff6b35');
  for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
    const d = dist(p.x, p.y, Ball.x, Ball.y); if (d < 200) { const a = angTo(Ball.x, Ball.y, p.x, p.y); const f = (1 - d / 200) * 700; p.vx += Math.cos(a) * f; p.vy += Math.sin(a) * f; p.tackledT = 0.5; }
  }
  Ball.bombT = 0; Ball.vx *= -0.3; Ball.vy *= -0.3;
}

function updateItems(dt, match) {
  // spawn
  match.itemTimer -= dt;
  if (match.itemTimer <= 0 && match.items.filter(i => !i.trap).length < 3) { match.itemTimer = rnd(4, 7); spawnItem(match); }
  for (let i = match.items.length - 1; i >= 0; i--) {
    const it = match.items[i]; it.bob += dt * 3; if (it.born) it.born -= dt;
    if (it.t != null) { it.t -= dt; if (it.t <= 0) { match.items.splice(i, 1); continue; } }
    // pickup / trap trigger
    for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
      if (p.frozenT > 0) continue;
      if (dist(p.x, p.y, it.x, it.y) < p.r + it.r) {
        if (it.trap) {
          if (p.team !== it.team && p.slipT <= 0 && p.ghostT <= 0) { p.slipT = 1.2; p.vx *= 1.4; p.vy *= 1.4; announce('SLIP!', '#ffe066'); burst(it.x, it.y, 12, { c: '#ffe066' }); Audio.tackle(); match.items.splice(i, 1); }
        } else if (!p.powerup && (it.born == null || it.born <= 0)) {
          p.powerup = it.kind; if (p.isUser) Audio.pickup(); else Audio.ui();
          announce(p.isUser ? ('GOT ' + POWERS[it.kind].icon + ' ' + POWERS[it.kind].name) : POWERS[it.kind].icon, POWERS[it.kind].c);
          burst(it.x, it.y, 14, { c: POWERS[it.kind].c }); match.items.splice(i, 1);
        }
        break;
      }
    }
  }
  // decoys fade/move
  for (let i = match.decoys.length - 1; i >= 0; i--) { const d = match.decoys[i]; d.life -= dt; d.x += d.vx * dt; d.y += d.vy * dt; d.vx *= 0.96; d.vy *= 0.96; d.rot += 0.1;
    d.x = clamp(d.x, PITCH.x + 8, PITCH.x + PITCH.w - 8); d.y = clamp(d.y, PITCH.y + 8, PITCH.y + PITCH.h - 8);
    if (d.life <= 0) match.decoys.splice(i, 1); }
  // tornado
  if (match.tornado) {
    const t = match.tornado; t.t -= dt;
    for (const p of [...match.teams[0].players, ...match.teams[1].players]) {
      if (p.team === t.team || p.ghostT > 0) continue; const d = dist(p.x, p.y, t.x, t.y);
      if (d < 200) { const a = angTo(p.x, p.y, t.x, t.y) + 1.3; const f = (1 - d / 200) * 400; p.vx += Math.cos(a) * f * dt * 60; p.vy += Math.sin(a) * f * dt * 60; }
    }
    if (dist(Ball.x, Ball.y, t.x, t.y) < 200 && !Ball.owner) { const a = angTo(Ball.x, Ball.y, t.x, t.y) + 1.2; Ball.vx += Math.cos(a) * 300 * dt * 60; Ball.vy += Math.sin(a) * 300 * dt * 60; }
    if (t.t <= 0) match.tornado = null;
  }
}

function doGoal(match, team) {
  match.teams[team].score++;
  match.state = 'goal'; match.celebrateT = 3.0; match.scorer = Ball.lastKicker && Ball.lastKicker.team === team ? Ball.lastKicker : null;
  match.lastGoalTeam = team;
  Audio.whistle(); Audio.goal(); crowdCheer();
  match.juice.shake(16); match.juice.flash('#fff', 0.5); match.juice.punch(0.16); match.slowmo = 0.25;
  confetti(Ball.x, Ball.y, 80); confetti(match.teams[team].players[0].x, 300, 40);
  burst(Ball.x, Ball.y, 30, { c: match.teams[team].color, smax: 400, up: 80 });
  const who = match.scorer ? match.scorer.def.name : 'MYSTERY';
  announce('⚽ GOOOAL!', match.teams[team].color, true);
  setTimeout(() => announce(who + ' SCORES!', '#fff'), 500);

}

function resetKickoff(match, towardTeam) {
  Ball.reset();
  for (const t of [0, 1]) for (const p of match.teams[t].players) { p.x = p.homeX; p.y = p.homeY; p.vx = p.vy = 0; p.frozenT = p.stunT = p.slipT = 0; p.powerup = p.powerup; }
  match.state = 'countdown'; match.countdown = 2.4; match.decoys.length = 0; match.tornado = null;

function drawBall() {
  // trail
  for (const t of Ball.trail) { ctx.globalAlpha = t.a * 0.5; ctx.fillStyle = Ball.bombT > 0 ? '#ff6b35' : Ball.homing ? '#00cec9' : '#fff'; ctx.beginPath(); ctx.arc(t.x, t.y, Ball.r * 0.7, 0, TAU); ctx.fill(); }

  const zlift = Ball.z * 26;
  // shadow
  ctx.globalAlpha = 0.3 / (1 + Ball.z); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(Ball.x, Ball.y + 2, Ball.r * (1 + Ball.z * 0.4), Ball.r * 0.5, 0, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
  ctx.save(); ctx.translate(Ball.x, Ball.y - zlift); ctx.rotate(Ball.rot);
  // bomb / homing tint
  let base = '#fff';
  if (Ball.bombT > 0) { base = (Math.sin(now() * 20) > 0) ? '#ff3b3b' : '#2d3436'; }
  else if (Ball.homing) base = '#d7fffb';
  ctx.fillStyle = base; ctx.beginPath(); ctx.arc(0, 0, Ball.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1.5; ctx.stroke();
  // pentagons
  ctx.fillStyle = '#1a1a1a';
  for (let i = 0; i < 5; i++) { const a = i / 5 * TAU; ctx.beginPath(); ctx.arc(Math.cos(a) * Ball.r * 0.5, Math.sin(a) * Ball.r * 0.5, Ball.r * 0.22, 0, TAU); ctx.fill(); }
  ctx.beginPath(); ctx.arc(0, 0, Ball.r * 0.26, 0, TAU); ctx.fill();
  // shine
  ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.beginPath(); ctx.arc(-Ball.r * 0.35, -Ball.r * 0.35, Ball.r * 0.28, 0, TAU); ctx.fill();
  ctx.restore();
  if (Ball.bombT > 0) { ctx.save(); ctx.globalAlpha = 0.6; ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(Ball.x, Ball.y - zlift, Ball.r + 6 + Math.sin(now() * 20) * 3, 0, TAU); ctx.stroke(); ctx.restore(); }
}
function drawItem(it) {
  if (it.trap) { // banana
    ctx.save(); ctx.translate(it.x, it.y + Math.sin(it.bob) * 2); ctx.rotate(Math.sin(it.bob * 0.5) * 0.3);
    ctx.fillStyle = '#ffe066'; ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0.2 * Math.PI, 1.2 * Math.PI); ctx.arc(6, 6, 12, 1.2 * Math.PI, 0.2 * Math.PI, true); ctx.fill(); ctx.stroke();
    ctx.restore(); return;
  }

  ctx.globalAlpha = 0.35 + Math.sin(it.bob) * 0.1; ctx.fillStyle = p.c;
  ctx.beginPath(); ctx.arc(it.x, yy, 22, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;

  ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 2; roundRect(-14, -14, 28, 28, 8); ctx.stroke();
  ctx.font = '18px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.icon, 0, 1);

}
function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

function drawTornado(t) {
  ctx.save(); ctx.translate(t.x, t.y); ctx.globalAlpha = clamp(t.t, 0, 1) * 0.8;

function update(dt) {
  pollGamepad();

  Input.powBuf = Math.max(0, Input.powBuf - dt);
  Input.switchBuf = Math.max(0, Input.switchBuf - dt);

  if (transT > 0) { transT -= dt; if (transT <= 0 && pendingScene) { scene = pendingScene; pendingScene = null; if (scene === 'title') titleT = 0; } }

  if (scene === 'title') updateTitle(dt);
  else if (scene === 'select') updateSelect(dt);
  else if (scene === 'match') updateMatch(dt);
  else if (scene === 'result') updateResult(dt);

  updateParticles(dt); updateAnnounce(dt);
  Audio.tickMusic(dt, scene !== 'title');
  Input.pausePressed = false;
}

function updateTitle(dt) {
  titleT += dt;
  for (const p of paradePlayers) {
    p.x += p.vx * dt; if (p.x < 40 || p.x > VW - 40) p.vx *= -1;
    p.x = clamp(p.x, 40, VW - 40);
    p.facing = p.vx > 0 ? 0 : Math.PI; p.animPhase += Math.abs(p.vx) * dt * 0.06;
    if (rand() < 0.004) p.celebrateT = 0.6;
  }
  if (Input.anyPressed && titleT > 0.3) { Input.anyPressed = false; Audio.ui(); ensureAudio();
    if (AUTO) startMatch(null, true); else fade('select'); }
}

function updateSelect(dt) {
  selCursor = clamp(selCursor, 0, ROSTER.length - 1);
  // pointer hover selection
  if (Input.switchBuf > 0) { Input.switchBuf = 0; }
  // keyboard nav handled via edge keys
  handleSelectNav();
  if (Input.kickBuf > 0) { Input.kickBuf = 0; Audio.pickup(); startMatch(ROSTER[selCursor], false); }
  if (Input.pausePressed) fade('title');
}
let selPrevKeys = {};
function handleSelectNav() {
  const cols = 4;
  const edge = (k) => Input.keys[k] && !selPrevKeys[k];
  if (edge('arrowright') || edge('d')) { selCursor = (selCursor + 1) % ROSTER.length; Audio.ui(); }
  if (edge('arrowleft') || edge('a')) { selCursor = (selCursor - 1 + ROSTER.length) % ROSTER.length; Audio.ui(); }
  if (edge('arrowdown') || edge('s')) { selCursor = (selCursor + cols) % ROSTER.length; Audio.ui(); }
  if (edge('arrowup') || edge('w')) { selCursor = (selCursor - cols + ROSTER.length) % ROSTER.length; Audio.ui(); }
  for (const k of ['arrowright', 'arrowleft', 'arrowup', 'arrowdown', 'a', 'd', 'w', 's']) selPrevKeys[k] = Input.keys[k];
  // mouse
  const layout = selectLayout();
  for (let i = 0; i < layout.length; i++) { const c = layout[i]; if (Input.mx > c.x && Input.mx < c.x + c.w && Input.my > c.y && Input.my < c.y + c.h) { if (selCursor !== i) { selCursor = i; } if (Input.mDown) { Input.mDown = false; Audio.pickup(); startMatch(ROSTER[i], false); } } }
}

function startMatch(choice, aiOnly) {
  match = newMatch(choice, aiOnly);
  scene = 'match'; transT = 0.35; transFrom = 'select'; pendingScene = null; scene = 'match';
  Audio.whistle();
}

function updateMatch(dt) {
  const m = match;
  if (Input.pausePressed && m.state !== 'paused' && m.state !== 'result') { m.prevState = m.state; m.state = 'paused'; Audio.ui(); return; }
  if (m.state === 'paused') { if (Input.pausePressed || Input.kickBuf > 0) { Input.kickBuf = 0; m.state = m.prevState; Audio.ui(); }
    // quit option
    if (Input.keys['q']) { fade('title'); }
    return; }

  m.juice.update(dt);
  const slow = m.state === 'goal' ? m.slowmo : 1;
  const sdt = dt * slow;
  m.slowmo = lerp(m.slowmo, 1, 0.02);

  if (m.state === 'countdown') {
    m.countdown -= dt;
    const n = Math.ceil(m.countdown);
    if (n !== m._lastN && n >= 0 && m.countdown > 0) { m._lastN = n; if (n <= 3) Audio.count(n); }
    if (m.countdown <= 0) { m.state = 'play'; announce('GO!', '#3ddc97'); Audio.count(0); }
    // still simulate light idle
    for (const t of m.teams) for (const p of t.players) integratePlayer(p, sdt, m);
    return;
  }

  if (m.state === 'play') {
    m.time -= dt;
    if (m.time <= 0) { endMatch(m); return; }
    // assign chasers
    for (const t of m.teams) t.chaser = teamChaser(t);
    if (!m.aiOnly) userControl(m, sdt);
    for (const t of m.teams) for (const p of t.players) { updateAI(p, sdt, m); integratePlayer(p, sdt, m); }
    playerCollisions(m);
    updateBall(sdt, m);
    updateItems(sdt, m);
    return;
  }

  if (m.state === 'goal') {
    m.celebrateT -= dt;
    for (const t of m.teams) for (const p of t.players) { if (p.celebrateT <= 0) updateAI(p, sdt, m); integratePlayer(p, sdt, m); }
    updateBall(sdt, m); updateParticles(0); // particles already updated globally
    if (m.celebrateT <= 0) {
      if (m.teams[0].score >= 99 || m.teams[1].score >= 99) endMatch(m);
      else resetKickoff(m, m.lastGoalTeam === 0 ? 1 : 0);
    }
    return;
  }
}
function endMatch(m) {
  m.state = 'result'; m.resultT = 0; Audio.whistle();
  const a = m.teams[0].score, b = m.teams[1].score;
  m.userWon = a > b; m.draw = a === b;
  if (!m.aiOnly) { if (a > b) { announce('🏆 YOU WIN!', '#ffd23f', true); confetti(VW / 2, 200, 120); crowdCheer(); Audio.goal(); } else if (a < b) announce('YOU LOSE…', '#ff6b6b', true); else announce("IT'S A DRAW!", '#fff', true); }
  scene = 'result';
}
function updateResult(dt) {
  match.resultT += dt;
  if (match.resultT > 0.6 && (Input.anyPressed || Input.kickBuf > 0)) { Input.anyPressed = false; Input.kickBuf = 0; Audio.ui(); fade('title'); }
}

/* ------------------------------- DRAW SCENES ----------------------------- */
const hintEl = document.getElementById('hint');
let _hintShown = true;
function render() {
  // The HTML control hint is helpful in menus but clutters the pitch during play.
  const showHint = (scene === 'title' || scene === 'select');
  if (showHint !== _hintShown) { hintEl.style.opacity = showHint ? '0.75' : '0'; _hintShown = showHint; }
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, VW, VH);
  if (scene === 'title') drawTitle();
  else if (scene === 'select') drawSelect();
  else if (scene === 'match' || scene === 'result') drawMatch();
  // transition wipe
  if (transT > 0) { const k = 1 - transT / 0.35; ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.fillStyle = '#05060d'; const h = VH * (transT > 0.175 ? (0.35 - transT) / 0.175 : (transT) / 0.175); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(5,6,13,' + (transT > 0.175 ? 1 : transT / 0.175) + ')'; ctx.fillRect(0, 0, VW, VH); ctx.globalAlpha = 1; }
  if (DEBUG) { ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.fillStyle = '#0f0'; ctx.font = '14px monospace'; ctx.textAlign = 'left'; ctx.fillText('FPS ' + metrics.fps.toFixed(0) + ' | scene ' + scene + ' | P ' + P.length, 10, VH - 10); }
}

function drawTitle() {
  // bg
  const g = ctx.createLinearGradient(0, 0, 0, VH); g.addColorStop(0, '#141a44'); g.addColorStop(1, '#0a0f22');
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
  // pitch strip backdrop
  for (let i = 0; i < 12; i++) { ctx.fillStyle = i % 2 ? 'rgba(33,154,84,.18)' : 'rgba(31,138,76,.18)'; ctx.fillRect(i * VW / 12, VH - 220, VW / 12, 220); }
  // parade
  paradePlayers.slice().sort((a, b) => a.y - b.y).forEach(p => drawCharacter(p));
  drawParticles(2); drawParticles(4);
  // logo
  ctx.save(); ctx.translate(VW / 2, 150 + Math.sin(titleT * 2) * 6);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const wobble = Math.sin(titleT * 3) * 0.02;
  ctx.rotate(wobble);
  // CHAOS
  ctx.font = '900 96px "Segoe UI", Impact, sans-serif';
  ctx.lineWidth = 14; ctx.strokeStyle = '#05060d'; ctx.strokeText('CHAOS CUP', 0, 0);
  const lg = ctx.createLinearGradient(0, -50, 0, 50); lg.addColorStop(0, '#ffe066'); lg.addColorStop(0.5, '#ff9f1c'); lg.addColorStop(1, '#ff4d6d');
  ctx.fillStyle = lg; ctx.fillText('CHAOS CUP', 0, 0);
  ctx.restore();
  ctx.save(); ctx.translate(VW / 2, 218); ctx.textAlign = 'center';
  ctx.font = '800 24px "Segoe UI", sans-serif'; ctx.fillStyle = '#8be9ff'; ctx.fillText('⚽ OUTRAGEOUS ARCADE SOCCER ⚽', 0, 0); ctx.restore();
  // prompt
  if (Math.sin(titleT * 4) > -0.3) { ctx.save(); ctx.textAlign = 'center'; ctx.font = '800 26px "Segoe UI", sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText('PRESS ENTER / TAP TO PLAY', VW / 2, VH - 90); ctx.restore(); }
  ctx.textAlign = 'center'; ctx.font = '600 14px "Segoe UI", sans-serif'; ctx.fillStyle = '#6b7aa0';
  ctx.fillText('WASD/Arrows move · Space kick · Shift power-up · 14 wild characters · 12 crazy power-ups', VW / 2, VH - 46);
  ctx.fillStyle = '#46527a'; ctx.fillText('M mute · a Claude Code loop-built game', VW / 2, VH - 26);
}

function selectLayout() {
  const cols = 4;
  const cw = 172, ch = 120, gap = 16;
  const totalW = cols * cw + (cols - 1) * gap;
  const x0 = (VW - totalW) / 2, y0 = 168;
  const out = [];
  for (let i = 0; i < ROSTER.length; i++) { const r = Math.floor(i / cols), c = i % cols; out.push({ x: x0 + c * (cw + gap), y: y0 + r * (ch + gap), w: cw, h: ch }); }
  return out;
}
function drawSelect() {
  ctx.fillStyle = '#0b1024'; ctx.fillRect(0, 0, VW, VH);
  for (let i = 0; i < 12; i++) { ctx.fillStyle = i % 2 ? 'rgba(33,154,84,.12)' : 'rgba(31,138,76,.12)'; ctx.fillRect(i * VW / 12, 0, VW / 12, VH); }
  ctx.textAlign = 'center'; ctx.font = '900 46px "Segoe UI", sans-serif'; ctx.fillStyle = '#ffd23f';
  ctx.fillText('PICK YOUR BALLER', VW / 2, 70);
  ctx.font = '600 16px "Segoe UI", sans-serif'; ctx.fillStyle = '#8fa3c8';
  ctx.fillText('Arrows/Mouse to choose · Space/Click to start · Esc to go back', VW / 2, 108);
  const layout = selectLayout();
  for (let i = 0; i < ROSTER.length; i++) {
    const c = layout[i], def = ROSTER[i], sel = i === selCursor;
    ctx.save(); ctx.fillStyle = sel ? 'rgba(255,210,63,.16)' : 'rgba(255,255,255,.04)';
    roundRect(c.x, c.y, c.w, c.h, 14); ctx.fill();
    ctx.strokeStyle = sel ? '#ffd23f' : 'rgba(255,255,255,.1)'; ctx.lineWidth = sel ? 3.5 : 1.5; roundRect(c.x, c.y, c.w, c.h, 14); ctx.stroke();
    // character preview
    const pv = { def, team: 0, teamColor: '#39a7ff', x: c.x + c.w / 2, y: c.y + 44 + (sel ? Math.sin(now() * 4) * 2 : 0), r: 20, facing: Math.sin(now() * 1.5 + i) * 0.6, vx: 0, vy: 0, animPhase: now() * 3 + i, seedPhase: i, squash: 0, kickT: 0, celebrateT: sel ? 0.6 : 0, giantT: 0, frozenT: 0 };
    drawCharacter(pv);
    ctx.textAlign = 'center'; ctx.font = '800 14px "Segoe UI", sans-serif'; ctx.fillStyle = sel ? '#fff' : '#c8d2ea';
    ctx.fillText(def.emoji + ' ' + def.name, c.x + c.w / 2, c.y + 82);
    // mini stat bars
    const stats = [['SPD', def.spd, '#4ea8ff'], ['POW', def.pow, '#ff4d6d'], ['IQ', def.iq, '#3ddc97']];
    const bw = 118, bx = c.x + c.w / 2 - bw / 2; let sy = c.y + 92;
    for (const [lbl, v, col] of stats) { ctx.fillStyle = 'rgba(255,255,255,.12)'; roundRect(bx, sy, bw, 4, 2); ctx.fill(); ctx.fillStyle = col; roundRect(bx, sy, bw * v, 4, 2); ctx.fill(); sy += 7; }
    ctx.restore();
  }
}

function drawMatch() {
  const m = match;
  ctx.save();
  m.juice.apply();
  drawStadium(now());
  // items under players
  for (const it of m.items) drawItem(it);
  if (m.tornado) drawTornado(m.tornado);
  drawParticles(1);
  // decoy balls
  for (const d of m.decoys) { ctx.save(); ctx.globalAlpha = clamp(d.life, 0, 1); ctx.translate(d.x, d.y); ctx.rotate(d.rot); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, d.r, 0, TAU); ctx.fill(); ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, 0, d.r * 0.3, 0, TAU); ctx.fill(); ctx.restore(); }
  // entities sorted by y
  const ents = [...m.teams[0].players, ...m.teams[1].players];
  ents.sort((a, b) => a.y - b.y);
  // ball drawn interleaved by y
  let ballDrawn = false;
  for (const p of ents) { if (!ballDrawn && Ball.y < p.y) { drawBall(); ballDrawn = true; } drawCharacter(p); }
  if (!ballDrawn) drawBall();
  drawParticles(2);
  ctx.restore();

  // screen-space overlays
  drawParticles(4); // confetti above field but below HUD text
  drawMatchHUD(m);
  drawAnnounce();

  if (m.state === 'countdown') drawCountdown(m);
  if (m.state === 'paused') drawPause(m);
  if (scene === 'result') drawResult(m);
  // flash
  if (m.juice.flashA > 0) { ctx.fillStyle = m.juice.flashC; ctx.globalAlpha = m.juice.flashA; ctx.fillRect(0, 0, VW, VH); ctx.globalAlpha = 1; }
}
function drawCountdown(m) {
  const n = Math.ceil(m.countdown);
  if (n <= 0 || m.countdown <= 0) return;
  const frac = m.countdown - Math.floor(m.countdown);
  ctx.save(); ctx.translate(VW / 2, VH / 2); const s = 1 + (1 - frac) * 1.4; ctx.scale(s, s); ctx.globalAlpha = clamp(frac * 1.5, 0, 1);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '900 120px "Segoe UI", sans-serif';
  ctx.lineWidth = 12; ctx.strokeStyle = '#05060d'; ctx.strokeText(n, 0, 0);
  ctx.fillStyle = n === 3 ? '#ff4d6d' : n === 2 ? '#ffd23f' : '#3ddc97'; ctx.fillText(n, 0, 0);
  ctx.restore();
}
function drawPause(m) {
  ctx.fillStyle = 'rgba(5,6,13,.75)'; ctx.fillRect(0, 0, VW, VH);
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = '900 60px "Segoe UI", sans-serif'; ctx.fillText('PAUSED', VW / 2, VH / 2 - 40);
  ctx.font = '700 22px "Segoe UI", sans-serif'; ctx.fillStyle = '#8fa3c8';
  ctx.fillText('Esc / Space to resume · Q to quit to menu', VW / 2, VH / 2 + 20);
  ctx.font = '600 15px "Segoe UI", sans-serif'; ctx.fillStyle = '#5a6a8a';
  ctx.fillText('M mute · Tab switch player · Shift use power-up', VW / 2, VH / 2 + 54);
}
function drawResult(m) {
  const k = clamp(m.resultT, 0, 1);
  ctx.fillStyle = 'rgba(5,6,13,' + 0.8 * k + ')'; ctx.fillRect(0, 0, VW, VH);
  ctx.save(); ctx.globalAlpha = k; ctx.textAlign = 'center';
  const title = m.aiOnly ? 'FULL TIME' : (m.userWon ? '🏆 YOU WIN!' : m.draw ? 'DRAW!' : 'YOU LOSE');
  ctx.font = '900 74px "Segoe UI", sans-serif'; ctx.lineWidth = 12; ctx.strokeStyle = '#05060d';
  ctx.strokeText(title, VW / 2, 170); ctx.fillStyle = m.userWon || m.aiOnly ? '#ffd23f' : '#ff6b6b'; ctx.fillText(title, VW / 2, 170);
  ctx.font = '900 60px "Segoe UI", sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(m.teams[0].score + '  –  ' + m.teams[1].score, VW / 2, 250);
  // MVP
  ctx.font = '700 20px "Segoe UI", sans-serif'; ctx.fillStyle = '#8be9ff';
  ctx.fillText('Press any key / tap to return to menu', VW / 2, VH - 80);
  ctx.restore();
}

/* --------------------------- FIT + MAIN LOOP ----------------------------- */
function fit() {
  const scale = Math.min(innerWidth / VW, innerHeight / VH);
  canvas.style.width = (VW * scale) + 'px';
  canvas.style.height = (VH * scale) + 'px';
  // Fixed logical backing store; CSS scales it to fit the viewport (letterboxed).
  canvas.width = VW; canvas.height = VH;
}
addEventListener('resize', fit); fit();

document.getElementById('boot').style.display = 'none';

function frame(t) {
  let dt = (t - last) / 1000; last = t;
  if (dt > 0.05) dt = 0.05; // clamp big gaps
  acc += dt; frames++; fpsT += dt;
  if (fpsT >= 0.5) { metrics.fps = frames / fpsT; frames = 0; fpsT = 0; }
  // fixed-step update
  let steps = 0;
  while (acc >= FIXED_DT && steps < 5) { update(FIXED_DT); acc -= FIXED_DT; steps++; metrics.frames++; }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ------------------------- DEBUG / HARNESS API --------------------------- */
window.CHAOS = {
  get scene() { return scene; },
  get match() { return match; },
  metrics,
  roster: ROSTER,
  powers: POWERS,
  startExhibition() { startMatch(null, true); },
  startUserMatch(name) { const def = ROSTER.find(r => r.name === name) || ROSTER[0]; startMatch(def, false); },
  skipTo(s) { scene = s; if (s === 'select') selCursor = 0; },
  spawnItem() { if (match) spawnItem(match); },
  forceGoal(team) { if (match && match.state === 'play') doGoal(match, team || 0); },
  version: '0.1.0'
};
if (AUTO) { // auto-start exhibition after a beat (for screenshots / CI)
  ensureAudio(); setTimeout(() => { if (scene === 'title') { titleT = 1; Input.anyPressed = true; } }, 400);
}
</script>
